name: Weekly Model Retrain

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run feature engineering
        run: python src/features/build_features.py

      - name: Check drift
        run: python src/monitoring/drift_detector.py

      - name: Run model training
        run: python src/models/train.py

      - name: Commit updated model
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add models/ reports/ || true
          git commit -m "chore: retrain model automatically" || echo "No changes to commit"
          git push || echo "Nothing to push"